version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Minimal infra profile: Kafka (KRaft) + 2× MySQL + 2× Redis.
# Run this when developing/debugging .NET projects locally via `dotnet run`.
# Usage:
#   docker compose -f docker/docker-compose.minimal.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Kafka (KRaft, no ZooKeeper) ────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── PACS MySQL (port 3307) ─────────────────────────────────────────────────
  pacs-mysql:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: epacs_pacs
    volumes:
      - pacs-mysql-data:/var/lib/mysql
      - ../db/mysql/pacs:/docker-entrypoint-initdb.d:ro
    command: >
      --innodb_flush_log_at_trx_commit=1
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      retries: 10

  # ── NLDR MySQL (port 3308) ─────────────────────────────────────────────────
  nldr-mysql:
    image: mysql:8.4
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: epacs_nldr
    volumes:
      - nldr-mysql-data:/var/lib/mysql
      - ../db/mysql/nldr:/docker-entrypoint-initdb.d:ro
    command: >
      --innodb_flush_log_at_trx_commit=1
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      retries: 10

  # ── PACS Redis (port 6380) ─────────────────────────────────────────────────
  pacs-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── NLDR Redis (port 6381) ─────────────────────────────────────────────────
  nldr-redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

volumes:
  kafka-data:
  pacs-mysql-data:
  nldr-mysql-data:
