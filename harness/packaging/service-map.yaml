      expected_status: 200
    recovery:
      first_failure: { action: "restart", delay_seconds: 15 }
      second_failure: { action: "restart", delay_seconds: 60 }
      subsequent: { action: "restart_and_bundle", delay_seconds: 120 }
      reset_after_seconds: 86400
    data_directories: []
    dependencies:
      - "ePACSMySQL"
      - "ePACSEventing"
      - "ePACS.Harness.NldrApi"

  - name: "ePACS.Harness.NldrDashboard"
    display_name: "ePACS Harness — NLDR Dashboard"
    description: "Razor MVC central observability dashboard"
    executable: "${BinaryRoot}\\harness\\Nldr.DashboardUi.exe"
    arguments: "--urls http://127.0.0.1:5401"
    account: "ePACSAppSvc"
    start_order: 170
    stop_order: 20
    startup_type: "Automatic"
    group: "nldr"
    health_check:
      type: "http"
      url: "http://127.0.0.1:5401/health/live"
      timeout_seconds: 10
      expected_status: 200
    recovery:
      first_failure: { action: "restart", delay_seconds: 5 }
      second_failure: { action: "restart", delay_seconds: 15 }
      subsequent: { action: "restart", delay_seconds: 30 }
      reset_after_seconds: 86400
    data_directories: []
    dependencies:
      - "ePACS.Harness.NldrApi"
